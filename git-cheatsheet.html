<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Git Cheat Sheet</title>
<style>
:root {
  --bg: #0d1117;
  --surface: #161b22;
  --surface2: #21262d;
  --border: #30363d;
  --text: #e6edf3;
  --muted: #8b949e;
  --accent: #f05033;
  --blue: #58a6ff;
  --green: #3fb950;
  --yellow: #e3b341;
  --purple: #bc8cff;
  --red: #f85149;
  --cyan: #39c5cf;
  --card-radius: 12px;
  --font-mono: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  font-size: 14px;
  line-height: 1.6;
}

/* ── TOP BAR ─────────────────────────────────────── */
.topbar {
  position: sticky; top: 0; z-index: 100;
  background: rgba(13,17,23,0.92);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 16px;
  padding: 12px 24px;
}
.topbar-logo {
  display: flex; align-items: center; gap: 10px;
  font-size: 18px; font-weight: 700; color: var(--text);
  text-decoration: none; white-space: nowrap;
}
.topbar-logo svg { width: 28px; height: 28px; }
.topbar-search {
  flex: 1; max-width: 480px;
  position: relative;
}
.topbar-search input {
  width: 100%; padding: 8px 14px 8px 36px;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 8px; color: var(--text); font-size: 13px;
  outline: none; transition: border-color .15s;
}
.topbar-search input:focus { border-color: var(--blue); }
.topbar-search input::placeholder { color: var(--muted); }
.topbar-search .search-icon {
  position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
  color: var(--muted); pointer-events: none;
}
.topbar-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }
.badge {
  padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600;
  background: var(--surface2); border: 1px solid var(--border); color: var(--muted);
}
.no-results-msg {
  display: none; text-align: center; padding: 60px 20px;
  color: var(--muted); font-size: 15px;
}

/* ── LAYOUT ──────────────────────────────────────── */
.layout { display: flex; min-height: calc(100vh - 57px); }

/* ── SIDEBAR ─────────────────────────────────────── */
.sidebar {
  width: 220px; flex-shrink: 0;
  position: sticky; top: 57px; height: calc(100vh - 57px);
  overflow-y: auto; padding: 20px 0;
  border-right: 1px solid var(--border);
  background: var(--surface);
}
.sidebar::-webkit-scrollbar { width: 4px; }
.sidebar::-webkit-scrollbar-track { background: transparent; }
.sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
.sidebar-label {
  padding: 4px 16px 2px;
  font-size: 10px; font-weight: 700; letter-spacing: 1px;
  text-transform: uppercase; color: var(--muted);
}
.sidebar-link {
  display: flex; align-items: center; gap: 8px;
  padding: 7px 16px; color: var(--muted);
  text-decoration: none; font-size: 13px;
  border-left: 2px solid transparent;
  transition: all .15s; cursor: pointer;
}
.sidebar-link:hover { color: var(--text); background: var(--surface2); }
.sidebar-link.active { color: var(--text); border-left-color: var(--accent); background: var(--surface2); }
.sidebar-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

/* ── MAIN CONTENT ────────────────────────────────── */
.main { flex: 1; padding: 32px 40px 80px; max-width: 1100px; }

.section { margin-bottom: 56px; }
.section-header {
  display: flex; align-items: center; gap: 12px;
  margin-bottom: 24px; padding-bottom: 12px;
  border-bottom: 1px solid var(--border);
}
.section-icon {
  width: 36px; height: 36px; border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
}
.section-title { font-size: 20px; font-weight: 700; }
.section-subtitle { font-size: 13px; color: var(--muted); }

.cards-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(460px, 1fr));
  gap: 20px;
}

/* ── COMMAND CARD ────────────────────────────────── */
.card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--card-radius); overflow: hidden;
  transition: border-color .15s, transform .15s;
}
.card:hover { border-color: #444c56; transform: translateY(-1px); }
.card-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 16px 12px;
  border-bottom: 1px solid var(--border);
  background: var(--surface2);
}
.card-title { font-size: 15px; font-weight: 700; font-family: var(--font-mono); color: var(--text); }
.card-tag {
  font-size: 10px; font-weight: 600; padding: 2px 8px;
  border-radius: 12px; border: 1px solid;
}
.card-body { padding: 14px 16px; }
.card-desc { font-size: 13px; color: var(--muted); margin-bottom: 12px; line-height: 1.5; }

/* ── DIAGRAM ─────────────────────────────────────── */
.diagram-wrap {
  background: #0a0e14; border: 1px solid var(--border);
  border-radius: 8px; padding: 12px 16px; margin-bottom: 12px;
  overflow-x: auto;
}
.diagram-label { font-size: 10px; color: var(--muted); font-weight: 600; letter-spacing: .5px; margin-bottom: 6px; text-transform: uppercase; }
.diagram-wrap svg { display: block; }

/* ── CODE EXAMPLES ───────────────────────────────── */
.examples { display: flex; flex-direction: column; gap: 6px; }
.example {
  display: flex; align-items: stretch;
  background: #0a0e14; border: 1px solid var(--border);
  border-radius: 6px; overflow: hidden;
}
.example-code {
  flex: 1; padding: 8px 12px;
  font-family: var(--font-mono); font-size: 12px;
  color: var(--text); white-space: pre-wrap; word-break: break-all;
  line-height: 1.5;
}
.example-comment { color: var(--muted); font-style: italic; }
.copy-btn {
  padding: 0 12px; background: transparent;
  border: none; border-left: 1px solid var(--border);
  cursor: pointer; color: var(--muted); font-size: 12px;
  transition: all .15s; flex-shrink: 0; display: flex; align-items: center; gap: 4px;
}
.copy-btn:hover { background: var(--surface2); color: var(--green); }
.copy-btn.copied { color: var(--green); }
.copy-btn svg { width: 13px; height: 13px; }

/* ── SECTION COLORS ──────────────────────────────── */
.color-orange { color: #f05033; background: rgba(240,80,51,.12); border-color: rgba(240,80,51,.3); }
.color-blue   { color: #58a6ff; background: rgba(88,166,255,.12); border-color: rgba(88,166,255,.3); }
.color-green  { color: #3fb950; background: rgba(63,185,80,.12); border-color: rgba(63,185,80,.3); }
.color-purple { color: #bc8cff; background: rgba(188,140,255,.12); border-color: rgba(188,140,255,.3); }
.color-yellow { color: #e3b341; background: rgba(227,179,65,.12); border-color: rgba(227,179,65,.3); }
.color-red    { color: #f85149; background: rgba(248,81,73,.12); border-color: rgba(248,81,73,.3); }
.color-cyan   { color: #39c5cf; background: rgba(57,197,207,.12); border-color: rgba(57,197,207,.3); }
.color-pink   { color: #ff7eb6; background: rgba(255,126,182,.12); border-color: rgba(255,126,182,.3); }
.bg-orange { background: rgba(240,80,51,.15); }
.bg-blue   { background: rgba(88,166,255,.15); }
.bg-green  { background: rgba(63,185,80,.15); }
.bg-purple { background: rgba(188,140,255,.15); }
.bg-yellow { background: rgba(227,179,65,.15); }
.bg-red    { background: rgba(248,81,73,.15); }
.bg-cyan   { background: rgba(57,197,207,.15); }
.bg-pink   { background: rgba(255,126,182,.15); }

/* ── HIDDEN ──────────────────────────────────────── */
.card.hidden { display: none; }
.section.all-hidden { display: none; }

/* ── SCROLLBAR ───────────────────────────────────── */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

@media (max-width: 900px) {
  .sidebar { display: none; }
  .main { padding: 20px 16px 60px; }
  .cards-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<!-- TOP BAR -->
<header class="topbar">
  <a class="topbar-logo" href="#">
    <svg viewBox="0 0 92 92" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path fill="#F05033" d="M90.155 41.965 50.036 1.846a5.918 5.918 0 0 0-8.372 0l-8.328 8.33 10.566 10.566a7.03 7.03 0 0 1 7.23 1.684 7.043 7.043 0 0 1 1.673 7.277l10.183 10.184a7.026 7.026 0 0 1 7.278 1.672 7.044 7.044 0 0 1 0 9.952 7.049 7.049 0 0 1-9.956 0 7.054 7.054 0 0 1-1.528-7.664l-9.5-9.498V59.36a7.044 7.044 0 0 1 1.86 11.29 7.048 7.048 0 0 1-9.955 0 7.044 7.044 0 0 1 0-9.951 7.03 7.03 0 0 1 2.304-1.537V33.926a7.031 7.031 0 0 1-2.304-1.537 7.054 7.054 0 0 1-1.522-7.682L32.016 14.13 1.845 44.297a5.918 5.918 0 0 0 0 8.372L41.964 92.64a5.918 5.918 0 0 0 8.372 0L90.155 52.52a5.918 5.918 0 0 0 0-8.555"/>
    </svg>
    Git Cheat Sheet
  </a>
  <div class="topbar-search">
    <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="text" id="searchInput" placeholder="Search commands, e.g. rebase, stash…" autocomplete="off">
  </div>
  <div class="topbar-right">
    <span class="badge" id="cmdCount"></span>
  </div>
</header>

<div class="layout">
  <!-- SIDEBAR -->
  <nav class="sidebar" id="sidebar"></nav>

  <!-- MAIN -->
  <main class="main" id="main">
    <div class="no-results-msg" id="noResults">No commands match your search.</div>
  </main>
</div>

<script>
// ─────────────────────────────────────────────────────────────
//  SVG DIAGRAM HELPERS
// ─────────────────────────────────────────────────────────────
const UNIT = 52, R = 13;

function pt(col, row) {
  return { x: col * UNIT + 24, y: row * UNIT + 26 };
}

function svgWrap(w, h, content) {
  return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg" style="font-family:monospace">
  <defs>
    <marker id="arr" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arr-b" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#58a6ff"/>
    </marker>
    <marker id="arr-g" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#3fb950"/>
    </marker>
  </defs>
  ${content}
</svg>`;
}

function commit(col, row, hash, color='#444c56', stroke='#6e7681') {
  const {x,y} = pt(col, row);
  return `<circle cx="${x}" cy="${y}" r="${R}" fill="${color}" stroke="${stroke}" stroke-width="1.5"/>
  <text x="${x}" y="${y+4}" text-anchor="middle" fill="#e6edf3" font-size="8" font-weight="600">${hash}</text>`;
}

function edge(c1, r1, c2, r2, color='#444c56', dashed=false) {
  const a = pt(c1, r1), b = pt(c2, r2);
  const dx = b.x - a.x, dy = b.y - a.y;
  const len = Math.sqrt(dx*dx + dy*dy);
  const nx = dx/len, ny = dy/len;
  const x1 = a.x + nx*(R+1), y1 = a.y + ny*(R+1);
  const x2 = b.x - nx*(R+3), y2 = b.y - ny*(R+3);
  return `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="${color}" stroke-width="2" stroke-dasharray="${dashed?'5,3':''}" marker-end="url(#arr)"/>`;
}

function edgeCurve(c1, r1, c2, r2, color='#444c56') {
  const a = pt(c1, r1), b = pt(c2, r2);
  const mx = (a.x + b.x) / 2;
  return `<path d="M${a.x+R} ${a.y} C${mx} ${a.y} ${mx} ${b.y} ${b.x-R} ${b.y}" fill="none" stroke="${color}" stroke-width="2" marker-end="url(#arr)"/>`;
}

function label(col, row, text, color, dy=-22, dx=0) {
  const {x,y} = pt(col, row);
  const lx = x + dx, ly = y + dy;
  const w = text.length * 6.5 + 12;
  return `<rect x="${lx-w/2}" y="${ly-9}" width="${w}" height="18" rx="9" fill="${color}" opacity="0.9"/>
  <text x="${lx}" y="${ly+4}" text-anchor="middle" fill="white" font-size="9" font-weight="700">${text}</text>`;
}

function head(col, row, dy=-22, dx=0) {
  const {x,y} = pt(col, row);
  const lx = x + dx, ly = y + dy;
  return `<rect x="${lx-18}" y="${ly-9}" width="36" height="18" rx="3" fill="#f05033" opacity="0.9"/>
  <text x="${lx}" y="${ly+4}" text-anchor="middle" fill="white" font-size="9" font-weight="700">HEAD</text>`;
}

function arrow(x1,y1,x2,y2,color='#555') {
  return `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="${color}" stroke-width="2.5" stroke-dasharray="4,2" marker-end="url(#arr)"/>`;
}

function divider(x, h) {
  return `<line x1="${x}" y1="8" x2="${x}" y2="${h-8}" stroke="#30363d" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="${x+6}" y="16" fill="#555" font-size="9">after</text>`;
}

function sLabel(x, y, text, color='#8b949e') {
  return `<text x="${x}" y="${y}" fill="${color}" font-size="9" font-weight="600">${text}</text>`;
}

function box(x,y,w,h,color,text) {
  return `<rect x="${x}" y="${y}" width="${w}" height="${h}" rx="6" fill="${color}" opacity="0.15" stroke="${color}" stroke-width="1" stroke-opacity="0.4"/>
  <text x="${x+w/2}" y="${y+h/2+4}" text-anchor="middle" fill="${color}" font-size="10" font-weight="600">${text}</text>`;
}

// ─────────────────────────────────────────────────────────────
//  COMMAND DATA
// ─────────────────────────────────────────────────────────────
const SECTIONS = [
{
  id:'setup', title:'Setup & Config', color:'#f05033', bg:'bg-orange', icon:'⚙️',
  commands:[
  {
    name:'git config',
    tag:'CONFIG', tagColor:'color-orange',
    desc:'Set user-level or repo-level configuration values. Use --global for user-wide settings stored in ~/.gitconfig.',
    examples:[
      { code:'git config --global user.name "Ada Lovelace"', note:'Set your name globally' },
      { code:'git config --global user.email "ada@example.com"', note:'Set your email globally' },
      { code:'git config --list --show-origin', note:'List all settings and where they come from' },
    ],
    diagram: () => {
      const w=320, h=90;
      return svgWrap(w,h,`
        ${box(10,10,140,68,'#f05033','~/.gitconfig')}
        ${sLabel(20,32,'user.name = "Ada"','#e6edf3')}
        ${sLabel(20,46,'user.email = "ada@…"','#e6edf3')}
        ${sLabel(20,60,'core.editor = vim','#e6edf3')}
        ${box(170,10,140,68,'#58a6ff','.git/config (local)')}
        ${sLabel(180,32,'user.email = "work@…"','#e6edf3')}
        ${sLabel(180,46,'core.autocrlf = false','#e6edf3')}
        ${sLabel(178,62,'← overrides global','#8b949e')}
      `);
    }
  },
  {
    name:'git help',
    tag:'CONFIG', tagColor:'color-orange',
    desc:'Open the manual page for any git command, or get a quick synopsis with -h.',
    examples:[
      { code:'git help commit', note:'Open full man page for commit' },
      { code:'git commit -h', note:'Quick one-screen synopsis' },
      { code:'git help -a', note:'List all available sub-commands' },
    ],
    diagram: () => {
      const w=280, h=80;
      return svgWrap(w,h,`
        ${box(10,8,100,60,'#f05033','git help X')}
        ${arrow(112,38,168,38,'#555')}
        ${box(170,8,100,60,'#58a6ff','man git-X')}
        ${sLabel(14,70,'git commit -h → short usage','#8b949e')}
      `);
    }
  }
  ]
},

{
  id:'repo', title:'Creating Repositories', color:'#58a6ff', bg:'bg-blue', icon:'📁',
  commands:[
  {
    name:'git init',
    tag:'REPO', tagColor:'color-blue',
    desc:'Create an empty Git repository in the current directory (or a given path). Creates a .git/ folder with all internal objects.',
    examples:[
      { code:'git init', note:'Initialise repo in current folder' },
      { code:'git init my-project', note:'Initialise in a new folder' },
      { code:'git init --bare repo.git', note:'Bare repo (no working tree, for servers)' },
    ],
    diagram: () => {
      const w=320, h=96;
      return svgWrap(w,h,`
        ${sLabel(10,14,'Before','#8b949e')}
        ${box(10,20,100,64,'#555','my-project/')}
        ${sLabel(24,46,'app.js','#e6edf3')}
        ${sLabel(24,60,'README','#e6edf3')}
        ${divider(130,96)}
        ${sLabel(144,14,'After','#8b949e')}
        ${box(140,20,160,64,'#58a6ff','my-project/')}
        ${sLabel(154,38,'.git/  ← new','#58a6ff')}
        ${sLabel(154,52,'app.js','#e6edf3')}
        ${sLabel(154,66,'README','#e6edf3')}
      `);
    }
  },
  {
    name:'git clone',
    tag:'REPO', tagColor:'color-blue',
    desc:'Copy a remote repository to your machine. Clones history, branches, and tags. Sets up "origin" remote automatically.',
    examples:[
      { code:'git clone https://github.com/org/repo.git', note:'Clone into ./repo' },
      { code:'git clone git@github.com:org/repo.git my-dir', note:'Clone into custom folder' },
      { code:'git clone --depth 1 https://github.com/org/repo.git', note:'Shallow clone (latest commit only)' },
    ],
    diagram: () => {
      const w=320, h=90;
      return svgWrap(w,h,`
        ${box(10,12,110,66,'#8b949e','github.com/org/repo')}
        ${sLabel(24,34,'main','#e6edf3')}
        ${sLabel(24,48,'feature/login','#e6edf3')}
        ${sLabel(24,62,'tags: v1.0','#e6edf3')}
        ${arrow(124,44,182,44,'#58a6ff')}
        ${sLabel(134,40,'clone','#58a6ff')}
        ${box(186,12,120,66,'#58a6ff','~/repo (local)')}
        ${sLabel(200,34,'main ✓','#e6edf3')}
        ${sLabel(200,48,'origin/main ✓','#e6edf3')}
        ${sLabel(200,62,'origin → remote','#8b949e')}
      `);
    }
  }
  ]
},

{
  id:'staging', title:'Staging Area', color:'#e3b341', bg:'bg-yellow', icon:'📋',
  commands:[
  {
    name:'git status',
    tag:'STAGING', tagColor:'color-yellow',
    desc:'Show which files are tracked, modified, staged, or untracked. Your constant companion for understanding the working tree.',
    examples:[
      { code:'git status', note:'Full output' },
      { code:'git status -s', note:'Short/porcelain format: M=modified, ??=untracked' },
      { code:'git status -sb', note:'Short format + branch info' },
    ],
    diagram: () => {
      const w=320, h=100;
      return svgWrap(w,h,`
        ${box(8,8,90,82,'#555','Working Tree')}
        ${sLabel(14,28,'auth.js','#e6edf3')}
        ${sLabel(14,42,'  modified','#e3b341')}
        ${sLabel(14,56,'db.js','#e6edf3')}
        ${sLabel(14,70,'  untracked','#8b949e')}
        ${box(108,8,90,82,'#e3b341','Staging Area')}
        ${sLabel(114,28,'login.js','#e6edf3')}
        ${sLabel(114,42,'  staged','#3fb950')}
        ${box(210,8,100,82,'#58a6ff','History')}
        ${sLabel(218,28,'a1b2 main','#e6edf3')}
        ${sLabel(218,42,'committed','#8b949e')}
        ${sLabel(10,98,'git status shows all three zones','#555')}
      `);
    }
  },
  {
    name:'git add',
    tag:'STAGING', tagColor:'color-yellow',
    desc:'Stage changes from the working tree into the index (staging area). The staged snapshot is what gets committed.',
    examples:[
      { code:'git add index.html', note:'Stage a specific file' },
      { code:'git add src/', note:'Stage everything under src/' },
      { code:'git add -p', note:'Interactively pick hunks to stage' },
      { code:'git add -A', note:'Stage all changes (new, modified, deleted)' },
    ],
    diagram: () => {
      const w=320, h=90;
      return svgWrap(w,h,`
        ${box(8,10,110,68,'#555','Working Tree')}
        ${sLabel(18,30,'login.js  ●','#e3b341')}
        ${sLabel(18,44,'auth.js   ●','#e3b341')}
        ${sLabel(18,58,'(modified)','#8b949e')}
        ${arrow(122,44,174,44,'#e3b341')}
        ${sLabel(126,40,'git add','#e3b341')}
        ${box(178,10,130,68,'#e3b341','Staging Area')}
        ${sLabel(188,30,'login.js  ★','#3fb950')}
        ${sLabel(188,44,'auth.js   ★','#3fb950')}
        ${sLabel(188,58,'ready to commit','#8b949e')}
      `);
    }
  },
  {
    name:'git diff',
    tag:'STAGING', tagColor:'color-yellow',

// ─────────────────────────────────────────────────────────────
//  RENDER
// ─────────────────────────────────────────────────────────────
function copyIcon() {
  return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>`;
}
function checkIcon() {
  return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>`;
}

function renderSidebar() {
  const sidebar = document.getElementById('sidebar');
  let html = '<div class="sidebar-label">Workflow Sections</div>';
  SECTIONS.forEach((s, i) => {
    html += `<a class="sidebar-link ${i===0?'active':''}" data-section="${s.id}" onclick="scrollTo('${s.id}')">
      <span class="sidebar-dot" style="background:${s.color}"></span>
      ${s.title}
    </a>`;
  });
  sidebar.innerHTML = html;
}

function renderMain() {
  const main = document.getElementById('main');
  let totalCommands = 0;
  let html = '';

  SECTIONS.forEach(section => {
    totalCommands += section.commands.length;
    html += `<section class="section" id="section-${section.id}" data-section="${section.id}">
      <div class="section-header">
        <div class="section-icon ${section.bg}">${section.icon}</div>
        <div>
          <div class="section-title">${section.title}</div>
          <div class="section-subtitle">${section.commands.length} command${section.commands.length>1?'s':''}</div>
        </div>
      </div>
      <div class="cards-grid">
        ${section.commands.map(cmd => renderCard(cmd)).join('')}
      </div>
    </section>`;
  });

  main.innerHTML += html;
  document.getElementById('cmdCount').textContent = `${totalCommands} commands`;
}

function renderCard(cmd) {
  const diagramHTML = cmd.diagram ? cmd.diagram() : '';
  const examplesHTML = cmd.examples.map(ex => `
    <div class="example">
      <div class="example-code"><span style="color:#58a6ff">$</span> ${escHtml(ex.code)}<span class="example-comment">  # ${escHtml(ex.note)}</span></div>
      <button class="copy-btn" onclick="copyCode(this, ${JSON.stringify(ex.code)})" title="Copy">${copyIcon()}</button>
    </div>
  `).join('');

  return `<div class="card" data-name="${cmd.name.toLowerCase()}" data-desc="${cmd.desc.toLowerCase()}">
    <div class="card-header">
      <span class="card-title">${escHtml(cmd.name)}</span>
      <span class="card-tag ${cmd.tagColor}">${cmd.tag}</span>
    </div>
    <div class="card-body">
      <div class="card-desc">${escHtml(cmd.desc)}</div>
      ${diagramHTML ? `<div class="diagram-wrap"><div class="diagram-label">Diagram</div>${diagramHTML}</div>` : ''}
      <div class="examples">${examplesHTML}</div>
    </div>
  </div>`;
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─────────────────────────────────────────────────────────────
//  INTERACTIVITY
// ─────────────────────────────────────────────────────────────
function copyCode(btn, text) {
  navigator.clipboard.writeText(text).then(() => {
    btn.innerHTML = checkIcon();
    btn.classList.add('copied');
    setTimeout(() => { btn.innerHTML = copyIcon(); btn.classList.remove('copied'); }, 1800);
  });
}

function scrollTo(sectionId) {
  const el = document.getElementById('section-' + sectionId);
  if (el) el.scrollIntoView({ behavior:'smooth', block:'start' });
  document.querySelectorAll('.sidebar-link').forEach(l => l.classList.toggle('active', l.dataset.section === sectionId));
}

function setupSearch() {
  const input = document.getElementById('searchInput');
  input.addEventListener('input', () => {
    const q = input.value.toLowerCase().trim();
    let anyVisible = false;
    document.querySelectorAll('.section').forEach(section => {
      let sectionHasVisible = false;
      section.querySelectorAll('.card').forEach(card => {
        const match = !q || card.dataset.name.includes(q) || card.dataset.desc.includes(q) ||
          card.textContent.toLowerCase().includes(q);
        card.classList.toggle('hidden', !match);
        if (match) sectionHasVisible = true;
      });
      section.classList.toggle('all-hidden', !sectionHasVisible);
      if (sectionHasVisible) anyVisible = true;
    });
    document.getElementById('noResults').style.display = anyVisible ? 'none' : 'block';
  });
}

function setupScrollSpy() {
  const observer = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        const id = entry.target.dataset.section;
        document.querySelectorAll('.sidebar-link').forEach(l => l.classList.toggle('active', l.dataset.section === id));
      }
    });
  }, { threshold: 0.2 });
  document.querySelectorAll('.section').forEach(s => observer.observe(s));
}

// ─────────────────────────────────────────────────────────────
//  INIT
// ─────────────────────────────────────────────────────────────
renderSidebar();
renderMain();
setupSearch();
setupScrollSpy();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Git Cheat Sheet</title>
<style>
:root {
  --bg:#0d1117; --sf:#161b22; --s2:#21262d; --bd:#30363d;
  --tx:#e6edf3; --mu:#8b949e;
  --blue:#58a6ff; --green:#3fb950; --yellow:#e3b341;
  --purple:#bc8cff; --red:#f85149; --cyan:#39c5cf; --pink:#ff7eb6;
  --orange:#f05033;
  --sbw:268px; --sbwc:50px; --tbh:50px;
  --mono:'SFMono-Regular',Consolas,'Liberation Mono',Menlo,monospace;
  --r:10px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;
  background:var(--bg);color:var(--tx);min-height:100vh;font-size:14px;line-height:1.6;overflow-x:hidden}

/* TOOLTIP */
#tip{position:fixed;z-index:9000;pointer-events:none;
  background:#1c2128;border:1px solid #444c56;color:#e6edf3;
  font-size:11.5px;padding:5px 10px;border-radius:6px;
  box-shadow:0 6px 20px rgba(0,0,0,.55);
  opacity:0;transition:opacity .12s;max-width:260px;line-height:1.45;
  white-space:normal}
#tip.show{opacity:1}

/* TOPBAR */
.topbar{position:sticky;top:0;z-index:500;height:var(--tbh);
  background:rgba(13,17,23,.95);backdrop-filter:blur(14px);
  border-bottom:1px solid var(--bd);
  display:flex;align-items:center;gap:10px;padding:0 16px}
.hbtn{width:32px;height:32px;border-radius:7px;border:1px solid var(--bd);
  background:var(--s2);color:var(--mu);cursor:pointer;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  transition:background .12s,color .12s}
.hbtn:hover{background:#2d333b;color:var(--tx)}
.hbtn svg{width:15px;height:15px}
.logo{display:flex;align-items:center;gap:8px;font-size:16px;font-weight:700;
  color:var(--tx);text-decoration:none;white-space:nowrap}
.logo svg{width:24px;height:24px}
.ml{margin-left:auto}
.badge{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;
  background:var(--s2);border:1px solid var(--bd);color:var(--mu)}

/* LAYOUT */
.layout{display:flex;height:calc(100vh - var(--tbh))}

/* SIDEBAR */
.sb{width:var(--sbw);flex-shrink:0;
  position:sticky;top:var(--tbh);height:calc(100vh - var(--tbh));
  background:var(--sf);border-right:1px solid var(--bd);
  display:flex;flex-direction:column;overflow:hidden;
  transition:width .28s cubic-bezier(.4,0,.2,1)}
.sb.closed{width:var(--sbwc)}

/* search */
.sb-srch{padding:9px 9px 8px;border-bottom:1px solid var(--bd);flex-shrink:0;
  overflow:hidden;transition:max-height .28s,opacity .2s,padding .28s;max-height:52px}
.sb.closed .sb-srch{max-height:0;opacity:0;padding:0;pointer-events:none}
.sb-srch-box{display:flex;align-items:center;gap:6px;
  background:var(--s2);border:1px solid var(--bd);border-radius:7px;padding:6px 10px;
  transition:border-color .15s}
.sb-srch-box:focus-within{border-color:var(--blue)}
.sb-srch-box svg{color:var(--mu);flex-shrink:0;width:13px;height:13px}
.sb-srch-box input{background:none;border:none;outline:none;color:var(--tx);
  font-size:12px;width:100%}
.sb-srch-box input::placeholder{color:var(--mu)}

/* tree */
.sb-tree{flex:1;overflow-y:auto;overflow-x:hidden;padding:6px 0 16px;
  transition:opacity .2s}
.sb.closed .sb-tree{opacity:0;pointer-events:none}
.sb-tree::-webkit-scrollbar{width:3px}
.sb-tree::-webkit-scrollbar-thumb{background:var(--bd);border-radius:2px}

.tsec-hdr{display:flex;align-items:center;gap:6px;
  padding:6px 10px;margin:1px 5px;border-radius:6px;cursor:pointer;user-select:none;
  transition:background .12s}
.tsec-hdr:hover{background:var(--s2)}
.tsec-hdr.active{background:var(--s2)}
.tarrow{font-size:8px;color:var(--mu);width:10px;flex-shrink:0;
  display:inline-block;transition:transform .18s;transform:rotate(0)}
.tarrow.open{transform:rotate(90deg)}
.ticon{font-size:13px;flex-shrink:0}
.tlabel{font-size:12px;font-weight:600;color:var(--tx);flex:1;white-space:nowrap}
.tcount{font-size:10px;color:var(--mu);background:var(--s2);
  border:1px solid var(--bd);border-radius:10px;padding:0 6px;flex-shrink:0}
.tchildren{overflow:hidden;transition:max-height .22s ease;max-height:400px}
.tchildren.shut{max-height:0}
.tcmd{display:flex;align-items:center;gap:6px;
  padding:4px 10px 4px 26px;margin:0 5px;border-radius:5px;
  cursor:pointer;color:var(--mu);font-size:11.5px;font-family:var(--mono);
  transition:color .12s,background .12s;white-space:nowrap}
.tcmd:hover{color:var(--tx);background:var(--s2)}
.tcmd.on{color:var(--blue);background:rgba(88,166,255,.08)}
.tcmd-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.tcmd:hover .tcmd-dot,.tcmd.on .tcmd-dot{background:currentColor}

/* collapsed rail */
.sb-rail{display:none;flex-direction:column;align-items:center;padding:8px 0;gap:2px}
.sb.closed .sb-tree{display:none}
.sb.closed .sb-srch{display:none}
.sb.closed .sb-rail{display:flex}
.rbtn{width:36px;height:36px;border-radius:7px;border:none;background:transparent;
  cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;
  transition:background .12s;color:var(--mu)}
.rbtn:hover,.rbtn.on{background:var(--s2)}

/* MAIN */
.main{flex:1;overflow-y:auto;padding:26px 30px 80px;scroll-behavior:smooth}
.main::-webkit-scrollbar{width:5px}
.main::-webkit-scrollbar-thumb{background:var(--bd);border-radius:3px}
.no-res{display:none;text-align:center;padding:80px 20px;color:var(--mu);font-size:15px}

/* SECTIONS */
.section{margin-bottom:50px;scroll-margin-top:18px}
.sec-hdr{display:flex;align-items:center;gap:12px;margin-bottom:20px;
  padding-bottom:12px;border-bottom:1px solid var(--bd)}
.sec-icon{width:34px;height:34px;border-radius:8px;
  display:flex;align-items:center;justify-content:center;font-size:16px}
.sec-title{font-size:19px;font-weight:700}
.sec-sub{font-size:12px;color:var(--mu)}
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(440px,1fr));gap:18px}

/* CARD */
.card{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);
  overflow:hidden;transition:border-color .15s,transform .15s,box-shadow .15s}
.card:hover{border-color:#444c56;transform:translateY(-1px);
  box-shadow:0 6px 22px rgba(0,0,0,.3)}
.card.hidden{display:none}
.card-hdr{display:flex;align-items:center;justify-content:space-between;
  padding:12px 14px;border-bottom:1px solid var(--bd);background:var(--s2)}
.card-name{font-size:14px;font-weight:700;font-family:var(--mono);color:var(--tx)}
.card-tag{font-size:10px;font-weight:700;padding:2px 9px;border-radius:12px;border:1px solid}
.card-body{padding:13px}
.card-desc{font-size:12.5px;color:var(--mu);margin-bottom:12px;line-height:1.55}

/* DIAGRAM */
.dw{background:#080c12;border:1px solid #1c2330;border-radius:8px;
  padding:10px 14px;margin-bottom:12px;overflow-x:auto;
  transition:border-color .15s}
.dw:hover{border-color:#2d3a4a}
.dw svg{display:block}

/* EXAMPLES */
.exs{display:flex;flex-direction:column;gap:5px}
.ex{display:flex;align-items:stretch;background:#080c12;
  border:1px solid var(--bd);border-radius:6px;overflow:hidden}
.ex-code{flex:1;padding:7px 11px;font-family:var(--mono);font-size:11.5px;
  color:var(--tx);line-height:1.5;word-break:break-all}
.ex-note{color:var(--mu);font-style:italic}
.cpbtn{padding:0 11px;background:transparent;border:none;
  border-left:1px solid var(--bd);cursor:pointer;color:var(--mu);
  display:flex;align-items:center;flex-shrink:0;
  transition:background .12s,color .12s}
.cpbtn:hover{background:var(--s2);color:var(--green)}
.cpbtn.done{color:var(--green)}
.cpbtn svg{width:13px;height:13px}

/* TAG COLORS */
.to{color:#f05033;background:rgba(240,80,51,.12);border-color:rgba(240,80,51,.3)}
.tb{color:#58a6ff;background:rgba(88,166,255,.12);border-color:rgba(88,166,255,.3)}
.tg{color:#3fb950;background:rgba(63,185,80,.12);border-color:rgba(63,185,80,.3)}
.tp{color:#bc8cff;background:rgba(188,140,255,.12);border-color:rgba(188,140,255,.3)}
.ty{color:#e3b341;background:rgba(227,179,65,.12);border-color:rgba(227,179,65,.3)}
.tr{color:#f85149;background:rgba(248,81,73,.12);border-color:rgba(248,81,73,.3)}
.tc{color:#39c5cf;background:rgba(57,197,207,.12);border-color:rgba(57,197,207,.3)}
.tk{color:#ff7eb6;background:rgba(255,126,182,.12);border-color:rgba(255,126,182,.3)}
/* BG */
.bgo{background:rgba(240,80,51,.13)}
.bgb{background:rgba(88,166,255,.13)}
.bgg{background:rgba(63,185,80,.13)}
.bgp{background:rgba(188,140,255,.13)}
.bgy{background:rgba(227,179,65,.13)}
.bgr{background:rgba(248,81,73,.13)}
.bgc{background:rgba(57,197,207,.13)}
.bgk{background:rgba(255,126,182,.13)}

.section.all-hidden{display:none}
@media(max-width:860px){.sb{display:none}.main{padding:16px 14px 60px}.cards-grid{grid-template-columns:1fr}}
</style>
</head>
<body>

<div id="tip"></div>

<header class="topbar">
  <button class="hbtn" id="toggleBtn" title="Toggle sidebar" onclick="toggleSb()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round">
      <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
    </svg>
  </button>
  <a class="logo" href="#">
    <svg viewBox="0 0 92 92" fill="none"><path fill="#F05033" d="M90.155 41.965 50.036 1.846a5.918 5.918 0 0 0-8.372 0l-8.328 8.33 10.566 10.566a7.03 7.03 0 0 1 7.23 1.684 7.043 7.043 0 0 1 1.673 7.277l10.183 10.184a7.026 7.026 0 0 1 7.278 1.672 7.044 7.044 0 0 1 0 9.952 7.049 7.049 0 0 1-9.956 0 7.054 7.054 0 0 1-1.528-7.664l-9.5-9.498V59.36a7.044 7.044 0 0 1 1.86 11.29 7.048 7.048 0 0 1-9.955 0 7.044 7.044 0 0 1 0-9.951 7.03 7.03 0 0 1 2.304-1.537V33.926a7.031 7.031 0 0 1-2.304-1.537 7.054 7.054 0 0 1-1.522-7.682L32.016 14.13 1.845 44.297a5.918 5.918 0 0 0 0 8.372L41.964 92.64a5.918 5.918 0 0 0 8.372 0L90.155 52.52a5.918 5.918 0 0 0 0-8.555"/></svg>
    Git Cheat Sheet
  </a>
  <div class="ml"><span class="badge" id="cmdBadge"></span></div>
</header>

<div class="layout">
  <nav class="sb" id="sb">
    <div class="sb-srch">
      <div class="sb-srch-box">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="text" id="srchInput" placeholder="Search commands..." autocomplete="off" spellcheck="false">
      </div>
    </div>
    <div class="sb-tree" id="sbTree"></div>
    <div class="sb-rail" id="sbRail"></div>
  </nav>
  <main class="main" id="main">
    <div class="no-res" id="noRes">No commands match your search.</div>
  </main>
</div>

<script>
// ============================================================
//  SVG DIAGRAM HELPERS  (strict ASCII arithmetic throughout)
// ============================================================
var U = 58, R = 13;

function gxy(col, row, ox, oy) {
  ox = ox || 0; oy = oy || 0;
  return { x: col * U + 26 + ox, y: row * U + 26 + oy };
}

function svgWrap(w, h, body) {
  var mrk = function(id, col) {
    return '<marker id="' + id + '" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto">'
         + '<polygon points="0,0 7,3.5 0,7" fill="' + col + '"/></marker>';
  };
  var d = '<defs>'
    + mrk('ah','#4d5566') + mrk('ahg','#3fb950') + mrk('ahb','#58a6ff')
    + mrk('ahc','#39c5cf') + mrk('ahp','#bc8cff') + mrk('ahr','#f85149')
    + mrk('ahk','#ff7eb6') + mrk('aho','#f05033')
    + '</defs>';
  return '<svg width="' + w + '" height="' + h + '" viewBox="0 0 ' + w + ' ' + h
       + '" xmlns="http://www.w3.org/2000/svg" style="font-family:monospace;overflow:visible">'
       + d + body + '</svg>';
}

// Commit circle
function C(col, row, hash, fill, tip, ox, oy) {
  fill = fill || '#2d333b';
  tip = tip || ''; ox = ox || 0; oy = oy || 0;
  var p = gxy(col, row, ox, oy);
  var stroke = (fill === '#2d333b') ? '#444c56' : fill;
  var ta = tip ? ' data-tip="' + tip.replace(/"/g, '&quot;') + '"' : '';
  return '<g' + ta + '>'
    + '<circle cx="' + p.x + '" cy="' + p.y + '" r="' + R + '" fill="' + fill
    + '" stroke="' + stroke + '" stroke-width="1.5"/>'
    + '<text x="' + p.x + '" y="' + (p.y + 4) + '" text-anchor="middle" fill="#fff"'
    + ' font-size="9" font-weight="700">' + hash + '</text></g>';
}

// Straight edge
function E(c1, r1, c2, r2, color, mid, ox, oy) {
  color = color || '#444c56'; mid = mid || 'ah'; ox = ox || 0; oy = oy || 0;
  var a = gxy(c1, r1, ox, oy), b = gxy(c2, r2, ox, oy);
  var dx = b.x - a.x, dy = b.y - a.y, len = Math.sqrt(dx * dx + dy * dy);
  if (len < 1) return '';
  var nx = dx / len, ny = dy / len;
  return '<line x1="' + (a.x + nx * (R + 1)) + '" y1="' + (a.y + ny * (R + 1))
       + '" x2="' + (b.x - nx * (R + 4)) + '" y2="' + (b.y - ny * (R + 4))
       + '" stroke="' + color + '" stroke-width="2" marker-end="url(#' + mid + ')"/>';
}

// Curved edge (commits on different rows)
function EC(c1, r1, c2, r2, color, mid, ox, oy) {
  color = color || '#444c56'; mid = mid || 'ah'; ox = ox || 0; oy = oy || 0;
  var a = gxy(c1, r1, ox, oy), b = gxy(c2, r2, ox, oy);
  var mx = (a.x + b.x) / 2;
  return '<path d="M' + a.x + ' ' + a.y + ' C' + mx + ' ' + a.y
       + ' ' + mx + ' ' + b.y + ' ' + b.x + ' ' + b.y
       + '" fill="none" stroke="' + color + '" stroke-width="2" marker-end="url(#' + mid + ')"/>';
}

// Branch label pill
function L(col, row, text, color, tip, dy, dx, ox, oy) {
  dy = (dy === undefined || dy === null) ? -20 : dy;
  dx = dx || 0; ox = ox || 0; oy = oy || 0;
  tip = tip || '';
  var p = gxy(col, row, ox, oy);
  var lx = p.x + dx, ly = p.y + dy;
  var w = text.length * 6.2 + 14;
  var ta = tip ? ' data-tip="' + tip.replace(/"/g, '&quot;') + '"' : '';
  return '<g' + ta + '>'
    + '<rect x="' + (lx - w / 2) + '" y="' + (ly - 9) + '" width="' + w + '" height="18"'
    + ' rx="9" fill="' + color + '"/>'
    + '<text x="' + lx + '" y="' + (ly + 4) + '" text-anchor="middle" fill="#fff"'
    + ' font-size="8.5" font-weight="700">' + text + '</text></g>';
}

// HEAD marker
function HD(col, row, tip, dy, dx, ox, oy) {
  dy = (dy === undefined || dy === null) ? -20 : dy;
  dx = dx || 0; ox = ox || 0; oy = oy || 0;
  tip = tip || 'HEAD - current checkout position';
  var p = gxy(col, row, ox, oy);
  var lx = p.x + dx, ly = p.y + dy;
  return '<g data-tip="' + tip.replace(/"/g, '&quot;') + '">'
    + '<rect x="' + (lx - 24) + '" y="' + (ly - 9) + '" width="48" height="18"'
    + ' rx="4" fill="#f05033"/>'
    + '<text x="' + lx + '" y="' + (ly + 4) + '" text-anchor="middle" fill="#fff"'
    + ' font-size="8.5" font-weight="800">HEAD</text></g>';
}

// Divider line with "after" label
function DIV(x, h) {
  return '<line x1="' + x + '" y1="4" x2="' + x + '" y2="' + (h - 4)
       + '" stroke="#243040" stroke-width="1.5" stroke-dasharray="5,3"/>'
       + '<rect x="' + (x + 3) + '" y="6" width="34" height="14" rx="7" fill="#243040"/>'
       + '<text x="' + (x + 20) + '" y="17" fill="#6b7a90" font-size="8" font-weight="700">after</text>';
}

// Plain text
function T(x, y, text, color, size, weight) {
  color = color || '#8b949e'; size = size || 9; weight = weight || 400;
  return '<text x="' + x + '" y="' + y + '" fill="' + color + '" font-size="' + size
       + '" font-weight="' + weight + '">' + text + '</text>';
}

// Filled box
function B(x, y, w, h, color, label, tip) {
  tip = tip || '';
  var ta = tip ? ' data-tip="' + tip.replace(/"/g, '&quot;') + '"' : '';
  return '<g' + ta + '>'
    + '<rect x="' + x + '" y="' + y + '" width="' + w + '" height="' + h
    + '" rx="7" fill="' + color + '22" stroke="' + color + '55" stroke-width="1"/>'
    + '<text x="' + (x + w / 2) + '" y="' + (y + h / 2 + 4) + '" text-anchor="middle"'
    + ' fill="' + color + '" font-size="10" font-weight="700">' + label + '</text></g>';
}

// Arrow (absolute coords)
function A(x1, y1, x2, y2, color, mid) {
  color = color || '#4d5566'; mid = mid || 'ah';
  return '<line x1="' + x1 + '" y1="' + y1 + '" x2="' + x2 + '" y2="' + y2
       + '" stroke="' + color + '" stroke-width="2" marker-end="url(#' + mid + ')"/>';
}

// ============================================================
//  COMMAND DATA
// ============================================================
var SECS = [
{
  id:'setup', title:'Setup & Config', color:'#f05033', bg:'bgo', icon:'&#9881;',
  cmds:[
  {
    name:'git config', id:'cfg',
    tag:'CONFIG', tc:'to',
    desc:'Set identity and preferences globally (~/.gitconfig) or per-repo (.git/config). Local settings override global ones.',
    ex:[
      {c:'git config --global user.name "Ada Lovelace"', n:'Set global username'},
      {c:'git config --global user.email "ada@example.com"', n:'Set global email'},
      {c:'git config --list --show-origin', n:'List all settings and where each comes from'},
      {c:'git config --global core.editor "code --wait"', n:'Set VS Code as default editor'}
    ],
    diag: function() {
      var w = 340, h = 96;
      return svgWrap(w, h,
        B(6, 8, 150, 78, '#f05033', '~/.gitconfig', 'Global: applies to every repo on this machine')
        + T(16, 30, 'user.name = "Ada"', '#e6edf3', 9)
        + T(16, 44, 'user.email = "ada@..."', '#e6edf3', 9)
        + T(16, 58, 'core.editor = code', '#e6edf3', 9)
        + T(16, 72, '<-- lower priority', '#8b949e', 8)
        + B(164, 8, 166, 78, '#58a6ff', '.git/config', 'Local: overrides global for this repo only')
        + T(174, 30, 'user.email = "work@..."', '#e6edf3', 9)
        + T(174, 44, 'core.autocrlf = false', '#e6edf3', 9)
        + T(174, 58, 'branch settings...', '#e6edf3', 9)
        + T(174, 72, '<-- higher priority', '#58a6ff', 8)
      );
    }
  },
  {
    name:'git help', id:'help',
    tag:'CONFIG', tc:'to',
    desc:'Open the full manual page for any command, or get a quick synopsis with -h.',
    ex:[
      {c:'git help commit', n:'Open man page for git-commit'},
      {c:'git commit -h', n:'Print short usage synopsis'},
      {c:'git help -a', n:'List every available sub-command'}
    ],
    diag: function() {
      var w = 300, h = 80;
      return svgWrap(w, h,
        B(8, 10, 106, 60, '#f05033', 'git help X', 'Opens the full git manual page')
        + A(118, 40, 156, 40, '#f05033', 'aho')
        + B(160, 10, 130, 60, '#58a6ff', 'man git-X', 'Full manual with all flags and examples')
        + T(8, 76, 'git X -h  ->  quick one-screen synopsis', '#555', 8.5)
      );
    }
  }
  ]
},

{
  id:'repo', title:'Creating Repositories', color:'#58a6ff', bg:'bgb', icon:'&#128193;',
  cmds:[
  {
    name:'git init', id:'init',
    tag:'REPO', tc:'tb',
    desc:'Create a new Git repository in the current directory. Adds a .git/ folder with all tracking internals.',
    ex:[
      {c:'git init', n:'Initialise in current directory'},
      {c:'git init my-project', n:'Create folder and initialise inside it'},
      {c:'git init --bare repo.git', n:'Bare repo (server use, no working tree)'}
    ],
    diag: function() {
      var w = 340, h = 100;
      return svgWrap(w, h,
        T(10, 13, 'Before', '#8b949e', 9, 600)
        + B(8, 18, 136, 74, '#4d5566', 'my-project/', 'Folder with files, not yet a git repo')
        + T(20, 40, 'src/app.js', '#e6edf3', 9)

  },
  {

        + E(0, 1, 1, 1) + E(1, 1, 2, 1) + E(2, 1, 3, 1) + E(3, 1, 4, 1)

    ],

        B(6, 6, 92, 76, '#58a6ff', '~/.git', 'Single shared object store for both directories')

        + A(100, 60, 140, 70, '#4d5566', 'ah')

      {c:'git submodule update --init --recursive', n:'Clone and initialise all submodules after clone'},

// ============================================================
//  BUILD SIDEBAR TREE
// ============================================================
function buildTree() {
  var tree = document.getElementById('sbTree');
  var rail = document.getElementById('sbRail');
  var tHtml = '', rHtml = '';

  SECS.forEach(function(s) {
    var cmds = '';
    s.cmds.forEach(function(c) {
      cmds += '<div class="tcmd" id="tcmd-' + c.id + '" onclick="jumpCard(\'' + c.id + '\')">'
            + '<span class="tcmd-dot" style="background:' + s.color + '55"></span>'
            + c.name + '</div>';
    });
    tHtml += '<div class="tree-sec" id="tsec-' + s.id + '">'
           + '<div class="tsec-hdr" id="thdr-' + s.id + '" onclick="toggleSec(\'' + s.id + '\')">'
           + '<span class="tarrow open" id="tarr-' + s.id + '">&#9654;</span>'
           + '<span class="ticon">' + s.icon + '</span>'
           + '<span class="tlabel">' + s.title + '</span>'
           + '<span class="tcount">' + s.cmds.length + '</span>'
           + '</div>'
           + '<div class="tchildren" id="tch-' + s.id + '">' + cmds + '</div>'
           + '</div>';

    rHtml += '<button class="rbtn" id="rbtn-' + s.id + '" title="' + s.title
           + '" onclick="jumpSection(\'' + s.id + '\')">'
           + '<span style="pointer-events:none">' + s.icon + '</span></button>';
  });

  tree.innerHTML = tHtml;
  rail.innerHTML = rHtml;
}

function toggleSec(id) {
  var ch = document.getElementById('tch-' + id);
  var arr = document.getElementById('tarr-' + id);
  var isOpen = ch.style.maxHeight !== '0px' && ch.style.maxHeight !== '';
  ch.style.maxHeight = isOpen ? '0px' : '400px';
  if (isOpen) {
    ch.classList.add('shut');
    arr.classList.remove('open');
  } else {
    ch.classList.remove('shut');
    arr.classList.add('open');
  }
}

// ============================================================
//  BUILD MAIN CONTENT
// ============================================================
var COPY_IC = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>';
var CHECK_IC = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>';

function he(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function buildMain() {
  var main = document.getElementById('main');
  var total = 0;
  var html = '';

  SECS.forEach(function(s) {
    total += s.cmds.length;
    var cards = '';

    s.cmds.forEach(function(cmd) {
      var exHtml = '';
      cmd.ex.forEach(function(e) {
        exHtml += '<div class="ex">'
                + '<div class="ex-code"><span style="color:#58a6ff">$</span> ' + he(e.c)
                + '<span class="ex-note">  # ' + he(e.n) + '</span></div>'
                + '<button class="cpbtn" onclick="doCopy(this,' + JSON.stringify(e.c) + ')" title="Copy">' + COPY_IC + '</button>'
                + '</div>';
      });

      cards += '<div class="card" id="card-' + cmd.id + '" data-keys="' + he(cmd.name) + ' ' + he(cmd.desc) + ' ' + he(cmd.tag) + '">'
             + '<div class="card-hdr">'
             + '<span class="card-name">' + he(cmd.name) + '</span>'
             + '<span class="card-tag ' + cmd.tc + '">' + cmd.tag + '</span>'
             + '</div>'
             + '<div class="card-body">'
             + '<p class="card-desc">' + he(cmd.desc) + '</p>'
             + '<div class="dw">' + cmd.diag() + '</div>'
             + '<div class="exs">' + exHtml + '</div>'
             + '</div></div>';
    });

    html += '<section class="section" id="sec-' + s.id + '" data-sid="' + s.id + '">'
          + '<div class="sec-hdr">'
          + '<div class="sec-icon ' + s.bg + '">' + s.icon + '</div>'
          + '<div><div class="sec-title">' + s.title + '</div>'
          + '<div class="sec-sub">' + s.cmds.length + ' command' + (s.cmds.length > 1 ? 's' : '') + '</div></div>'
          + '</div>'
          + '<div class="cards-grid">' + cards + '</div>'
          + '</section>';
  });

  main.innerHTML += html;
  document.getElementById('cmdBadge').textContent = total + ' commands';
}

// ============================================================
//  COPY TO CLIPBOARD
// ============================================================
function doCopy(btn, text) {
  navigator.clipboard.writeText(text).then(function() {
    btn.innerHTML = CHECK_IC;
    btn.classList.add('done');
    setTimeout(function() { btn.innerHTML = COPY_IC; btn.classList.remove('done'); }, 1800);
  });
}

// ============================================================
//  SIDEBAR TOGGLE
// ============================================================
var sbClosed = false;
function toggleSb() {
  sbClosed = !sbClosed;
  document.getElementById('sb').classList.toggle('closed', sbClosed);
}

// ============================================================
//  NAVIGATION
// ============================================================
function jumpCard(id) {
  var el = document.getElementById('card-' + id);
  if (!el) return;
  el.scrollIntoView({ behavior: 'smooth', block: 'center' });
  var orig = el.style.boxShadow;
  el.style.transition = 'box-shadow .15s';
  el.style.boxShadow = '0 0 0 2px #58a6ff99';
  setTimeout(function() { el.style.boxShadow = orig; }, 1400);
}

function jumpSection(id) {
  var el = document.getElementById('sec-' + id);
  if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
  setActiveSection(id);
}

function setActiveSection(id) {
  document.querySelectorAll('.tsec-hdr').forEach(function(e) { e.classList.remove('active'); });
  var hdr = document.getElementById('thdr-' + id);
  if (hdr) hdr.classList.add('active');
  document.querySelectorAll('.rbtn').forEach(function(e) { e.classList.remove('on'); });
  var rb = document.getElementById('rbtn-' + id);
  if (rb) rb.classList.add('on');
}

function setActiveCmd(id) {
  document.querySelectorAll('.tcmd').forEach(function(e) { e.classList.remove('on'); });
  var c = document.getElementById('tcmd-' + id);
  if (c) c.classList.add('on');
}

// ============================================================
//  SEARCH
// ============================================================
document.getElementById('srchInput').addEventListener('input', function() {
  var q = this.value.toLowerCase().trim();
  var any = false;

  document.querySelectorAll('.section').forEach(function(sec) {
    var vis = false;
    sec.querySelectorAll('.card').forEach(function(card) {
      var match = !q || card.dataset.keys.toLowerCase().indexOf(q) >= 0;
      card.classList.toggle('hidden', !match);
      if (match) vis = true;
    });
    sec.classList.toggle('all-hidden', !vis);
    if (vis) any = true;
  });

  document.getElementById('noRes').style.display = any ? 'none' : 'block';

  if (q) {
    SECS.forEach(function(s) {
      var ch = document.getElementById('tch-' + s.id);
      var arr = document.getElementById('tarr-' + s.id);
      if (ch) { ch.style.maxHeight = '400px'; ch.classList.remove('shut'); }
      if (arr) arr.classList.add('open');
    });
  }
});

// ============================================================
//  SCROLL SPY
// ============================================================
var mainEl = document.querySelector('.main');
mainEl.addEventListener('scroll', function() {
  var top = mainEl.scrollTop;
  var mid = top + mainEl.clientHeight / 3;
  var curSec = null, curCmd = null;

  document.querySelectorAll('.section:not(.all-hidden)').forEach(function(s) {
    if (s.offsetTop <= mid) curSec = s.dataset.sid;
  });
  document.querySelectorAll('.card:not(.hidden)').forEach(function(c) {
    if (c.offsetTop <= mid + 60) curCmd = c.id.replace('card-', '');
  });

  if (curSec) setActiveSection(curSec);
  if (curCmd) setActiveCmd(curCmd);
}, { passive: true });

// ============================================================
//  TOOLTIP ENGINE
// ============================================================
var tipEl = document.getElementById('tip');
var tipTimer = null;

document.addEventListener('mousemove', function(e) {
  if (tipEl.classList.contains('show')) {
    var left = Math.min(e.clientX + 14, window.innerWidth - tipEl.offsetWidth - 8);
    var top = Math.max(e.clientY - 40, 6);
    tipEl.style.left = left + 'px';
    tipEl.style.top = top + 'px';
  }
});

document.addEventListener('mouseover', function(e) {
  var tgt = e.target.closest ? e.target.closest('[data-tip]') : null;
  if (!tgt) return;
  clearTimeout(tipTimer);
  var msg = tgt.getAttribute('data-tip');
  tipTimer = setTimeout(function() {
    tipEl.textContent = msg;
    tipEl.classList.add('show');
  }, 180);
});

document.addEventListener('mouseout', function(e) {
  var tgt = e.target.closest ? e.target.closest('[data-tip]') : null;
  if (!tgt) return;
  clearTimeout(tipTimer);
  tipEl.classList.remove('show');
});

// ============================================================
//  INIT
// ============================================================
buildTree();
buildMain();
</script>
</body>
</html>

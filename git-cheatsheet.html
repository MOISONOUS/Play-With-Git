<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Git Cheat Sheet</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,400;0,500;0,700;1,400&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#07060c; --sf:rgba(20,17,28,.72); --s2:rgba(32,27,44,.85); --glass:rgba(255,255,255,.03);
  --bd:rgba(255,255,255,.07); --bd2:rgba(255,255,255,.14);
  --tx:#f0ecf6; --mu:#8d84a0; --du:#4d4660;
  --orange:#ff7847; --blue:#5aa4f4; --green:#4dde8a;
  --yellow:#f0b454; --purple:#b08af2; --red:#ff6b6b;
  --cyan:#3cd2e0; --pink:#f084d2;
  --grad:linear-gradient(120deg,#ff7847 0%,#f084d2 50%,#b08af2 100%);
  --sbw:264px; --sbwc:52px; --tbh:52px;
  --mono:'JetBrains Mono','SFMono-Regular',Consolas,'Liberation Mono',Menlo,monospace;
  --disp:'Space Grotesk',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  --r:12px; --rs:8px;
  --ease:cubic-bezier(.16,1,.3,1);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  font-family:var(--disp);
  background:var(--bg);color:var(--tx);min-height:100vh;font-size:14px;
  line-height:1.6;overflow-x:hidden;
}

/* ====== ANIMATED BACKGROUND ====== */
.bg-fx{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.bg-fx::before{
  content:'';position:absolute;inset:0;
  background-image:linear-gradient(rgba(255,255,255,.025) 1px,transparent 1px),
                   linear-gradient(90deg,rgba(255,255,255,.025) 1px,transparent 1px);
  background-size:44px 44px;
  mask-image:radial-gradient(ellipse 90% 70% at 50% 0%,black 30%,transparent 75%);
  -webkit-mask-image:radial-gradient(ellipse 90% 70% at 50% 0%,black 30%,transparent 75%);
}
.orb{position:absolute;border-radius:50%;filter:blur(110px);opacity:.5;will-change:transform}
.orb-1{width:560px;height:560px;background:radial-gradient(circle,#ff784733,transparent 65%);top:-180px;left:-120px;animation:drift1 26s ease-in-out infinite alternate}
.orb-2{width:640px;height:640px;background:radial-gradient(circle,#b08af233,transparent 65%);top:10%;right:-220px;animation:drift2 32s ease-in-out infinite alternate}
.orb-3{width:480px;height:480px;background:radial-gradient(circle,#3cd2e022,transparent 65%);bottom:-200px;left:30%;animation:drift3 38s ease-in-out infinite alternate}
@keyframes drift1{from{transform:translate(0,0) scale(1)}to{transform:translate(140px,90px) scale(1.15)}}
@keyframes drift2{from{transform:translate(0,0) scale(1.1)}to{transform:translate(-160px,120px) scale(.95)}}
@keyframes drift3{from{transform:translate(0,0)}to{transform:translate(120px,-100px) scale(1.2)}}

/* ====== KEYFRAMES ====== */
@keyframes fadeUp{from{opacity:0;transform:translateY(26px)}to{opacity:1;transform:none}}
@keyframes fadeIn{to{opacity:1}}
@keyframes popIn{0%{opacity:0;transform:scale(0)}70%{transform:scale(1.18)}100%{opacity:1;transform:scale(1)}}
@keyframes rectIn{from{opacity:0;transform:scale(.7)}to{opacity:1;transform:scale(1)}}
@keyframes drawLine{to{stroke-dashoffset:0}}
@keyframes headPulse{0%,100%{filter:drop-shadow(0 0 0px #ff7847)}50%{filter:drop-shadow(0 0 7px #ff7847cc)}}
@keyframes shimmer{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
@keyframes blink{0%,49%{opacity:1}50%,100%{opacity:0}}
@keyframes spinSlow{to{transform:rotate(360deg)}}
@keyframes glowPulse{0%,100%{box-shadow:0 0 18px #ff784722}50%{box-shadow:0 0 34px #ff784755}}

/* ====== TOOLTIP ====== */
#tip{
  position:fixed;z-index:9000;pointer-events:none;
  background:rgba(26,22,38,.92);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border:1px solid var(--bd2);color:var(--tx);
  font-size:11px;padding:6px 11px;border-radius:8px;
  box-shadow:0 8px 32px rgba(0,0,0,.7),0 0 0 1px rgba(255,255,255,.04) inset;
  opacity:0;transform:translateY(5px) scale(.96);
  transition:opacity .18s var(--ease),transform .18s var(--ease);
  max-width:250px;line-height:1.45;white-space:normal;font-family:var(--mono)
}
#tip.show{opacity:1;transform:translateY(0) scale(1)}

/* ====== TOPBAR ====== */
.topbar{
  position:sticky;top:0;z-index:500;height:var(--tbh);
  background:rgba(10,8,16,.65);backdrop-filter:blur(18px) saturate(1.4);-webkit-backdrop-filter:blur(18px) saturate(1.4);
  border-bottom:1px solid var(--bd);
  display:flex;align-items:center;gap:12px;padding:0 16px;
}
#progress{
  position:absolute;top:0;left:0;height:2px;width:0%;
  background:var(--grad);background-size:200% 100%;
  animation:shimmer 4s linear infinite;
  box-shadow:0 0 12px #ff784788;
  transition:width .15s ease-out;border-radius:0 2px 2px 0
}
.hbtn{
  width:34px;height:34px;border-radius:10px;
  border:1px solid var(--bd);background:var(--glass);color:var(--mu);
  cursor:pointer;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  transition:background .2s,color .2s,border-color .2s,transform .15s
}
.hbtn:hover{background:var(--s2);color:var(--tx);border-color:var(--bd2)}
.hbtn:active{transform:scale(.92)}
.hbtn svg{width:15px;height:15px}
.logo{
  display:flex;align-items:center;gap:9px;
  font-family:var(--mono);font-size:13.5px;font-weight:700;
  color:var(--tx);text-decoration:none;white-space:nowrap;
  letter-spacing:-0.03em
}
.logo-path{color:var(--mu);font-weight:400}
.logo svg{width:20px;height:20px;filter:drop-shadow(0 0 8px #f0503355);transition:transform .5s var(--ease)}
.logo:hover svg{transform:rotate(360deg)}
.ml{margin-left:auto;display:flex;align-items:center;gap:10px}
.badge{
  font-family:var(--mono);font-size:11px;color:var(--mu);letter-spacing:-0.02em;
  border:1px solid var(--bd);border-radius:99px;padding:3px 12px;
  background:var(--glass)
}
.badge b{color:var(--orange);font-weight:700}

/* ====== LAYOUT ====== */
.layout{display:flex;height:calc(100vh - var(--tbh));position:relative;z-index:1}

/* ====== SIDEBAR ====== */
.sb{
  width:var(--sbw);flex-shrink:0;
  position:sticky;top:var(--tbh);height:calc(100vh - var(--tbh));
  background:rgba(13,11,20,.6);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border-right:1px solid var(--bd);
  display:flex;flex-direction:column;overflow:hidden;
  transition:width .35s var(--ease)
}
.sb.closed{width:var(--sbwc)}
.sb-srch{
  padding:10px;border-bottom:1px solid var(--bd);flex-shrink:0;
  overflow:hidden;transition:max-height .3s,opacity .25s,padding .3s;max-height:56px
}
.sb.closed .sb-srch{max-height:0;opacity:0;padding:0;pointer-events:none}
.sb-srch-box{
  display:flex;align-items:center;gap:7px;
  background:rgba(0,0,0,.35);border:1px solid var(--bd);
  border-radius:10px;padding:7px 11px;
  transition:border-color .25s,box-shadow .25s
}
.sb-srch-box:focus-within{border-color:#ff784788;box-shadow:0 0 0 3px #ff784722,0 0 18px #ff784722}
.sb-srch-box svg{color:var(--mu);flex-shrink:0;width:12px;height:12px}
.sb-srch-box input{
  background:none;border:none;outline:none;color:var(--tx);
  font-size:11.5px;width:100%;font-family:var(--mono)
}
.sb-srch-box input::placeholder{color:var(--du)}
.kbd{
  font-family:var(--mono);font-size:9px;color:var(--du);
  border:1px solid var(--bd);border-radius:5px;padding:1px 6px;flex-shrink:0
}
.sb-tree{flex:1;overflow-y:auto;overflow-x:hidden;padding:6px 0 14px;transition:opacity .25s}
.sb.closed .sb-tree{opacity:0;pointer-events:none}
.sb-tree::-webkit-scrollbar{width:3px}
.sb-tree::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:2px}

.tsec-hdr{
  display:flex;align-items:center;gap:7px;
  padding:7px 12px;margin:1px 6px;border-radius:9px;
  cursor:pointer;user-select:none;
  transition:background .2s;
  position:relative
}
.tsec-hdr::before{
  content:'';position:absolute;left:-6px;top:50%;transform:translateY(-50%) scaleY(0);
  width:3px;height:60%;border-radius:0 3px 3px 0;
  background:var(--sec-color,var(--orange));
  transition:transform .25s var(--ease)
}
.tsec-hdr:hover{background:var(--glass)}
.tsec-hdr.active{background:var(--glass)}
.tsec-hdr.active::before{transform:translateY(-50%) scaleY(1)}
.tarrow{font-size:7px;color:var(--du);width:8px;flex-shrink:0;
  display:inline-block;transition:transform .25s var(--ease);transform:rotate(0)}
.tarrow.open{transform:rotate(90deg)}
.ticon{font-size:12px;flex-shrink:0;opacity:.7;transition:transform .25s var(--ease)}
.tsec-hdr:hover .ticon{transform:scale(1.25)}
.tlabel{font-size:11.5px;font-weight:600;color:var(--mu);flex:1;white-space:nowrap;transition:color .2s}
.tsec-hdr:hover .tlabel,.tsec-hdr.active .tlabel{color:var(--tx)}
.tcount{
  font-size:9px;color:var(--du);font-family:var(--mono);flex-shrink:0;
  border:1px solid var(--bd);border-radius:99px;padding:0 6px;min-width:18px;text-align:center
}
.tsec-hdr.active .tcount{color:var(--sec-color,var(--orange));border-color:var(--sec-color,var(--orange))}
.tchildren{overflow:hidden;transition:max-height .3s var(--ease);max-height:400px}
.tchildren.shut{max-height:0}
.tcmd{
  display:flex;align-items:center;gap:7px;
  padding:4px 12px 4px 26px;margin:0 6px;border-radius:7px;
  cursor:pointer;color:var(--mu);font-size:10.5px;font-family:var(--mono);
  transition:color .15s,background .15s,padding-left .2s var(--ease);white-space:nowrap
}
.tcmd:hover{color:var(--tx);background:var(--glass);padding-left:30px}
.tcmd.on{color:var(--tx);background:var(--glass)}
.tcmd-dot{
  width:4px;height:4px;border-radius:50%;flex-shrink:0;
  background:var(--du);transition:background .2s,box-shadow .2s,transform .2s
}
.tcmd:hover .tcmd-dot,.tcmd.on .tcmd-dot{
  background:var(--sec-color,var(--orange));
  box-shadow:0 0 8px var(--sec-color,var(--orange));
  transform:scale(1.3)
}
.sb-rail{display:none;flex-direction:column;align-items:center;padding:10px 0;gap:3px}
.sb.closed .sb-tree{display:none}
.sb.closed .sb-srch{display:none}
.sb.closed .sb-rail{display:flex}
.rbtn{
  width:36px;height:36px;border-radius:10px;border:1px solid transparent;background:transparent;
  cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;
  transition:background .2s,border-color .2s,transform .15s;color:var(--mu)
}
.rbtn:hover{background:var(--glass);border-color:var(--bd);transform:scale(1.1)}
.rbtn.on{background:var(--glass);border-color:var(--sec-color,var(--orange));color:var(--sec-color,var(--orange))}

/* ====== MAIN ====== */
.main{flex:1;overflow-y:auto;padding:0 32px 100px;scroll-behavior:smooth;position:relative}
.main::-webkit-scrollbar{width:5px}
.main::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:3px}
.no-res{
  display:none;text-align:center;padding:90px 20px;color:var(--mu);
  font-size:13px;font-family:var(--mono)
}
.no-res .big{font-size:34px;display:block;margin-bottom:14px;opacity:.5}

/* ====== HERO ====== */
.hero{
  padding:64px 0 56px;text-align:center;position:relative;
  animation:fadeUp .9s var(--ease) both
}
.hero-eyebrow{
  display:inline-flex;align-items:center;gap:8px;
  font-family:var(--mono);font-size:10.5px;letter-spacing:.22em;text-transform:uppercase;
  color:var(--mu);border:1px solid var(--bd);border-radius:99px;padding:6px 16px;
  background:var(--glass);margin-bottom:26px;
  animation:glowPulse 4s ease-in-out infinite
}
.hero-eyebrow .pulse-dot{
  width:6px;height:6px;border-radius:50%;background:var(--green);
  box-shadow:0 0 10px var(--green);
  animation:blink 1.6s steps(1) infinite
}
.hero h1{
  font-size:clamp(40px,6.5vw,72px);font-weight:700;letter-spacing:-.045em;line-height:1.04;
  margin-bottom:18px
}
.hero h1 .grad{
  background:var(--grad);background-size:220% 220%;
  -webkit-background-clip:text;background-clip:text;color:transparent;
  animation:shimmer 6s ease-in-out infinite
}
.hero-sub{color:var(--mu);font-size:16px;max-width:520px;margin:0 auto 30px;line-height:1.7}
.hero-term{
  display:inline-flex;align-items:center;gap:10px;
  font-family:var(--mono);font-size:14px;
  background:rgba(0,0,0,.45);border:1px solid var(--bd);border-radius:12px;
  padding:13px 22px;box-shadow:0 14px 50px rgba(0,0,0,.5),0 0 0 1px rgba(255,255,255,.03) inset;
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px)
}
.hero-term .dollar{color:var(--orange);font-weight:700}
.hero-term #typed{color:var(--tx);min-width:1px;text-align:left}
.hero-term .cursor{
  width:8px;height:17px;background:var(--orange);border-radius:1px;
  animation:blink 1.1s steps(1) infinite;box-shadow:0 0 8px var(--orange)
}
.hero-stats{
  display:flex;justify-content:center;gap:34px;margin-top:38px;flex-wrap:wrap
}
.hstat{text-align:center}
.hstat .n{
  font-family:var(--mono);font-size:26px;font-weight:700;letter-spacing:-.04em;
  background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent
}
.hstat .l{font-size:10px;color:var(--mu);letter-spacing:.18em;text-transform:uppercase;margin-top:2px}

/* ====== SECTIONS ====== */
.section{margin-bottom:64px;scroll-margin-top:20px}
.sec-hdr{
  display:flex;align-items:center;gap:13px;
  margin-bottom:22px;padding:18px 0 15px;position:relative;
  opacity:0;transform:translateY(18px);
  transition:opacity .7s var(--ease),transform .7s var(--ease)
}
.section.seen .sec-hdr{opacity:1;transform:none}
.sec-hdr::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,var(--sec-color,var(--orange)),transparent 70%);
  transform-origin:left;transform:scaleX(0);
  transition:transform 1s var(--ease) .15s
}
.section.seen .sec-hdr::after{transform:scaleX(1)}
.sec-icon{
  font-size:17px;width:42px;height:42px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  border-radius:12px;background:var(--glass);border:1px solid var(--bd);
  box-shadow:0 0 22px color-mix(in srgb,var(--sec-color,#ff7847) 16%,transparent)
}
.sec-title{font-size:20px;font-weight:700;letter-spacing:-0.03em}
.sec-sub{font-size:10.5px;color:var(--mu);font-family:var(--mono);margin-top:1px}
.sec-count{
  margin-left:auto;font-family:var(--mono);font-size:10px;color:var(--du);
  border:1px solid var(--bd);border-radius:99px;padding:3px 11px
}
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(440px,1fr));gap:16px}

/* ====== CARD ====== */
.card{
  --mx:50%;--my:0%;
  background:var(--sf);
  backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  border:1px solid var(--bd);
  border-radius:var(--r);
  overflow:hidden;position:relative;
  opacity:0;translate:0 30px;
  transition:
    opacity .7s var(--ease) var(--d,0s),
    translate .7s var(--ease) var(--d,0s),
    transform .3s var(--ease),
    border-color .3s,box-shadow .3s
}
.card.seen{opacity:1;translate:0 0}
.card:hover{
  transform:translateY(-4px);
  border-color:color-mix(in srgb,var(--sec-color,#ff7847) 45%,transparent);
  box-shadow:
    0 18px 50px rgba(0,0,0,.5),
    0 0 36px color-mix(in srgb,var(--sec-color,#ff7847) 13%,transparent)
}
.card::before{
  content:'';position:absolute;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(420px circle at var(--mx) var(--my),
    color-mix(in srgb,var(--sec-color,#ff7847) 8%,transparent),transparent 65%);
  opacity:0;transition:opacity .35s
}
.card:hover::before{opacity:1}
.card.hidden{display:none}
.card-hdr{
  display:flex;align-items:center;gap:8px;
  padding:12px 16px;border-bottom:1px solid var(--bd);
  background:rgba(0,0,0,.22);position:relative;z-index:1
}
.card-prompt{
  color:var(--sec-color,var(--mu));font-family:var(--mono);
  font-size:12px;flex-shrink:0;opacity:.7;user-select:none;
  text-shadow:0 0 10px var(--sec-color,transparent)
}
.card-name{
  font-size:13.5px;font-weight:700;font-family:var(--mono);
  color:var(--tx);letter-spacing:-0.03em;flex:1
}
.card-tag{
  font-size:8.5px;font-weight:700;padding:2.5px 9px;
  border-radius:99px;font-family:var(--mono);
  letter-spacing:.1em;border:1px solid;flex-shrink:0
}
.card-body{padding:14px 16px;position:relative;z-index:1}
.card-desc{font-size:12.5px;color:var(--mu);margin-bottom:12px;line-height:1.7}

/* ====== DIAGRAM ====== */
.dw{
  background:rgba(0,0,0,.42);border:1px solid var(--bd);
  border-radius:var(--rs);padding:12px 14px;margin-bottom:12px;overflow-x:auto;
  position:relative
}
.dw::after{
  content:'';position:absolute;inset:0;border-radius:inherit;pointer-events:none;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.04)
}
.dw svg{display:block}
/* diagram entrance choreography */
.dw svg circle{opacity:0;transform-box:fill-box;transform-origin:center;transform:scale(0)}
.card.seen .dw svg circle{animation:popIn .55s cubic-bezier(.34,1.56,.64,1) .25s forwards}
.dw svg rect{opacity:0;transform-box:fill-box;transform-origin:center;transform:scale(.7)}
.card.seen .dw svg rect{animation:rectIn .5s var(--ease) .35s forwards}
.dw svg text{opacity:0}
.card.seen .dw svg text{animation:fadeIn .55s ease .55s forwards}
.dw svg line:not([stroke-dasharray]),
.dw svg path:not([stroke-dasharray]){stroke-dasharray:600;stroke-dashoffset:600}
.card.seen .dw svg line:not([stroke-dasharray]),
.card.seen .dw svg path:not([stroke-dasharray]){animation:drawLine 1s var(--ease) .4s forwards}
.dw svg line[stroke-dasharray],.dw svg path[stroke-dasharray]{opacity:0}
.card.seen .dw svg line[stroke-dasharray],
.card.seen .dw svg path[stroke-dasharray]{animation:fadeIn .6s ease .8s forwards}
.dw svg marker polygon{opacity:1;animation:none}
.card.seen .dw svg g.hd{animation:headPulse 2.6s ease-in-out 1.2s infinite}

/* ====== EXAMPLES ====== */
.exs{display:flex;flex-direction:column;gap:5px}
.ex{
  display:flex;align-items:stretch;
  background:rgba(0,0,0,.42);border:1px solid var(--bd);
  border-radius:var(--rs);overflow:hidden;
  transition:border-color .2s,transform .2s var(--ease)
}
.ex:hover{border-color:color-mix(in srgb,var(--sec-color,#ff7847) 35%,transparent);transform:translateX(3px)}
.ex-prompt{
  padding:6px 10px;
  color:var(--sec-color,var(--mu));font-family:var(--mono);
  font-size:10.5px;border-right:1px solid var(--bd);
  flex-shrink:0;opacity:.6;user-select:none;
  display:flex;align-items:center
}
.ex-code{
  flex:1;padding:6px 11px;font-family:var(--mono);font-size:10.5px;
  color:var(--tx);line-height:1.55;word-break:break-all
}
.ex-note{color:var(--mu)}
.cpbtn{
  padding:0 11px;background:transparent;border:none;
  border-left:1px solid var(--bd);cursor:pointer;color:var(--du);
  display:flex;align-items:center;flex-shrink:0;
  transition:background .2s,color .2s
}
.cpbtn:hover{background:var(--glass);color:var(--green)}
.cpbtn.done{color:var(--green)}
.cpbtn svg{width:12px;height:12px;transition:transform .3s cubic-bezier(.34,1.56,.64,1)}
.cpbtn.done svg{transform:scale(1.25)}

/* ====== TAG COLORS ====== */
.to{color:#ff7847;background:rgba(255,120,71,.1);border-color:rgba(255,120,71,.3)}
.tb{color:#5aa4f4;background:rgba(90,164,244,.1);border-color:rgba(90,164,244,.3)}
.tg{color:#4dde8a;background:rgba(77,222,138,.1);border-color:rgba(77,222,138,.3)}
.tp{color:#b08af2;background:rgba(176,138,242,.1);border-color:rgba(176,138,242,.3)}
.ty{color:#f0b454;background:rgba(240,180,84,.1);border-color:rgba(240,180,84,.3)}
.tr{color:#ff6b6b;background:rgba(255,107,107,.1);border-color:rgba(255,107,107,.3)}

<script>
// ============================================================
//  SVG DIAGRAM HELPERS  (strict ASCII arithmetic throughout)
// ============================================================
var U = 58, R = 13;

function gxy(col, row, ox, oy) {
  ox = ox || 0; oy = oy || 0;
  return { x: col * U + 26 + ox, y: row * U + 26 + oy };
}

function svgWrap(w, h, body) {
  var mrk = function(id, col) {
    return '<marker id="' + id + '" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto">'
         + '<polygon points="0,0 7,3.5 0,7" fill="' + col + '"/></marker>';
  };
  var d = '<defs>'
    + mrk('ah','#4d5566') + mrk('ahg','#4dde8a') + mrk('ahb','#5aa4f4')
    + mrk('ahc','#3cd2e0') + mrk('ahp','#b08af2') + mrk('ahr','#ff6b6b')
    + mrk('ahk','#f084d2') + mrk('aho','#ff7847')
    + '</defs>';
  return '<svg width="' + w + '" height="' + h + '" viewBox="0 0 ' + w + ' ' + h
       + '" xmlns="http://www.w3.org/2000/svg" style="font-family:monospace;overflow:visible">'
       + d + body + '</svg>';
}

// Commit circle
function C(col, row, hash, fill, tip, ox, oy) {
  fill = fill || '#2d333b';
  tip = tip || ''; ox = ox || 0; oy = oy || 0;
  var p = gxy(col, row, ox, oy);
  var stroke = (fill === '#2d333b') ? '#444c56' : fill;
  var ta = tip ? ' data-tip="' + tip.replace(/"/g, '&quot;') + '"' : '';
  return '<g' + ta + '>'
    + '<circle cx="' + p.x + '" cy="' + p.y + '" r="' + R + '" fill="' + fill
    + '" stroke="' + stroke + '" stroke-width="1.5"/>'
    + '<text x="' + p.x + '" y="' + (p.y + 4) + '" text-anchor="middle" fill="#fff"'
    + ' font-size="9" font-weight="700">' + hash + '</text></g>';
}

// Straight edge
function E(c1, r1, c2, r2, color, mid, ox, oy) {
  color = color || '#444c56'; mid = mid || 'ah'; ox = ox || 0; oy = oy || 0;
  var a = gxy(c1, r1, ox, oy), b = gxy(c2, r2, ox, oy);
  var dx = b.x - a.x, dy = b.y - a.y, len = Math.sqrt(dx * dx + dy * dy);
  if (len < 1) return '';
  var nx = dx / len, ny = dy / len;
  return '<line x1="' + (a.x + nx * (R + 1)) + '" y1="' + (a.y + ny * (R + 1))
       + '" x2="' + (b.x - nx * (R + 4)) + '" y2="' + (b.y - ny * (R + 4))
       + '" stroke="' + color + '" stroke-width="2" marker-end="url(#' + mid + ')"/>';
}

// Curved edge (commits on different rows)
function EC(c1, r1, c2, r2, color, mid, ox, oy) {
  color = color || '#444c56'; mid = mid || 'ah'; ox = ox || 0; oy = oy || 0;
  var a = gxy(c1, r1, ox, oy), b = gxy(c2, r2, ox, oy);
  var mx = (a.x + b.x) / 2;
  return '<path d="M' + a.x + ' ' + a.y + ' C' + mx + ' ' + a.y
       + ' ' + mx + ' ' + b.y + ' ' + b.x + ' ' + b.y
       + '" fill="none" stroke="' + color + '" stroke-width="2" marker-end="url(#' + mid + ')"/>';
}

// Branch label pill
function L(col, row, text, color, tip, dy, dx, ox, oy) {
  dy = (dy === undefined || dy === null) ? -20 : dy;
  dx = dx || 0; ox = ox || 0; oy = oy || 0;
  tip = tip || '';
  var p = gxy(col, row, ox, oy);
  var lx = p.x + dx, ly = p.y + dy;
  var w = text.length * 6.2 + 14;
  var ta = tip ? ' data-tip="' + tip.replace(/"/g, '&quot;') + '"' : '';
  return '<g' + ta + '>'
    + '<rect x="' + (lx - w / 2) + '" y="' + (ly - 9) + '" width="' + w + '" height="18"'
    + ' rx="9" fill="' + color + '"/>'
    + '<text x="' + lx + '" y="' + (ly + 4) + '" text-anchor="middle" fill="#fff"'
    + ' font-size="8.5" font-weight="700">' + text + '</text></g>';
}

// HEAD marker
function HD(col, row, tip, dy, dx, ox, oy) {
  dy = (dy === undefined || dy === null) ? -20 : dy;
  dx = dx || 0; ox = ox || 0; oy = oy || 0;
  tip = tip || 'HEAD - current checkout position';
  var p = gxy(col, row, ox, oy);
  var lx = p.x + dx, ly = p.y + dy;
  return '<g class="hd" data-tip="' + tip.replace(/"/g, '&quot;') + '">'
    + '<rect x="' + (lx - 24) + '" y="' + (ly - 9) + '" width="48" height="18"'
    + ' rx="4" fill="#ff7847"/>'
    + '<text x="' + lx + '" y="' + (ly + 4) + '" text-anchor="middle" fill="#fff"'
    + ' font-size="8.5" font-weight="800">HEAD</text></g>';
}

// Divider line with "after" label
function DIV(x, h) {
  return '<line x1="' + x + '" y1="4" x2="' + x + '" y2="' + (h - 4)
       + '" stroke="#243040" stroke-width="1.5" stroke-dasharray="5,3"/>'
       + '<rect x="' + (x + 3) + '" y="6" width="34" height="14" rx="7" fill="#243040"/>'
       + '<text x="' + (x + 20) + '" y="17" fill="#6b7a90" font-size="8" font-weight="700">after</text>';
}

// Plain text
function T(x, y, text, color, size, weight) {
  color = color || '#8b949e'; size = size || 9; weight = weight || 400;
  return '<text x="' + x + '" y="' + y + '" fill="' + color + '" font-size="' + size
       + '" font-weight="' + weight + '">' + text + '</text>';
}

// Filled box
function B(x, y, w, h, color, label, tip) {
  tip = tip || '';
  var ta = tip ? ' data-tip="' + tip.replace(/"/g, '&quot;') + '"' : '';
  return '<g' + ta + '>'
    + '<rect x="' + x + '" y="' + y + '" width="' + w + '" height="' + h
    + '" rx="7" fill="' + color + '22" stroke="' + color + '55" stroke-width="1"/>'
    + '<text x="' + (x + w / 2) + '" y="' + (y + h / 2 + 4) + '" text-anchor="middle"'
    + ' fill="' + color + '" font-size="10" font-weight="700">' + label + '</text></g>';
}

// Arrow (absolute coords)
function A(x1, y1, x2, y2, color, mid) {
  color = color || '#4d5566'; mid = mid || 'ah';
  return '<line x1="' + x1 + '" y1="' + y1 + '" x2="' + x2 + '" y2="' + y2
       + '" stroke="' + color + '" stroke-width="2" marker-end="url(#' + mid + ')"/>';
}

// ============================================================
//  BUILD SIDEBAR TREE
// ============================================================
function buildTree() {
  var tree = document.getElementById('sbTree');
  var rail = document.getElementById('sbRail');
  var tHtml = '', rHtml = '';

  SECS.forEach(function(s) {
    var cmds = '';
    s.cmds.forEach(function(c) {
      cmds += '<div class="tcmd" id="tcmd-' + c.id + '" style="--sec-color:' + s.color + '" onclick="jumpCard(\'' + c.id + '\')">'
            + '<span class="tcmd-dot"></span>'
            + c.name + '</div>';
    });
    tHtml += '<div class="tree-sec" id="tsec-' + s.id + '">'
           + '<div class="tsec-hdr" id="thdr-' + s.id + '" style="--sec-color:' + s.color + '" onclick="toggleSec(\'' + s.id + '\')">'
           + '<span class="tarrow open" id="tarr-' + s.id + '">&#9654;</span>'
           + '<span class="ticon">' + s.icon + '</span>'
           + '<span class="tlabel">' + s.title + '</span>'
           + '<span class="tcount">' + s.cmds.length + '</span>'
           + '</div>'
           + '<div class="tchildren" id="tch-' + s.id + '">' + cmds + '</div>'
           + '</div>';

    rHtml += '<button class="rbtn" id="rbtn-' + s.id + '" style="--sec-color:' + s.color + '" title="' + s.title
           + '" onclick="jumpSection(\'' + s.id + '\')">'
           + '<span style="pointer-events:none">' + s.icon + '</span></button>';
  });

  tree.innerHTML = tHtml;
  rail.innerHTML = rHtml;
}

function toggleSec(id) {
  var ch = document.getElementById('tch-' + id);
  var arr = document.getElementById('tarr-' + id);
  var isOpen = ch.style.maxHeight !== '0px' && ch.style.maxHeight !== '';
  ch.style.maxHeight = isOpen ? '0px' : '400px';
  if (isOpen) {
    ch.classList.add('shut');
    arr.classList.remove('open');
  } else {
    ch.classList.remove('shut');
    arr.classList.add('open');
  }
}

//  BUILD MAIN CONTENT
// ============================================================
var COPY_IC = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>';
var CHECK_IC = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>';

function he(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

var TOTAL_EX = 0;

function buildMain() {
  var main = document.getElementById('main');
  var total = 0;
  var html = '';

  SECS.forEach(function(s) {
    total += s.cmds.length;
    var cards = '';

    s.cmds.forEach(function(cmd, ci) {
      var exHtml = '';
      cmd.ex.forEach(function(e) {
        TOTAL_EX++;
        exHtml += '<div class="ex">'
                + '<div class="ex-prompt">$</div>'
                + '<div class="ex-code">' + he(e.c)
                + '<span class="ex-note">  # ' + he(e.n) + '</span></div>'
                + '<button class="cpbtn" onclick="doCopy(this,' + JSON.stringify(e.c) + ')" title="Copy">' + COPY_IC + '</button>'
                + '</div>';
      });

      cards += '<div class="card" id="card-' + cmd.id + '" style="--sec-color:' + s.color + ';--d:' + ((ci % 4) * 0.08) + 's" data-keys="' + he(cmd.name) + ' ' + he(cmd.desc) + ' ' + he(cmd.tag) + '">'
             + '<div class="card-hdr">'
             + '<span class="card-prompt">$</span>'
             + '<span class="card-name">' + he(cmd.name) + '</span>'
             + '<span class="card-tag ' + cmd.tc + '">' + cmd.tag + '</span>'
             + '</div>'
             + '<div class="card-body">'
             + '<p class="card-desc">' + he(cmd.desc) + '</p>'
             + '<div class="dw">' + cmd.diag() + '</div>'
             + '<div class="exs">' + exHtml + '</div>'
             + '</div></div>';
    });

    html += '<section class="section" id="sec-' + s.id + '" data-sid="' + s.id + '" style="--sec-color:' + s.color + '">'
          + '<div class="sec-hdr">'
          + '<div class="sec-icon" style="color:' + s.color + '">' + s.icon + '</div>'
          + '<div style="flex:1">'
          + '<div class="sec-title" style="color:' + s.color + '">' + s.title + '</div>'
          + '<div class="sec-sub">' + s.cmds.length + ' command' + (s.cmds.length > 1 ? 's' : '') + '</div>'
          + '</div>'
          + '<span class="sec-count">#' + s.id + '</span>'
          + '</div>'
          + '<div class="cards-grid">' + cards + '</div>'
          + '</section>';
  });

  html += '<div class="foot">crafted with <span class="heart">&#10084;</span> &amp; git &mdash; hover the diagrams for details</div>';

  main.innerHTML += html;
  document.getElementById('cmdBadge').innerHTML = '<b>' + total + '</b> commands';
  return total;
}

// ============================================================
//  COPY TO CLIPBOARD
// ============================================================
function doCopy(btn, text) {
  navigator.clipboard.writeText(text).then(function() {
    btn.innerHTML = CHECK_IC;
    btn.classList.add('done');
    setTimeout(function() { btn.innerHTML = COPY_IC; btn.classList.remove('done'); }, 1800);
  });
}

// ============================================================
//  SIDEBAR TOGGLE
// ============================================================
var sbClosed = false;
function toggleSb() {
  sbClosed = !sbClosed;
  document.getElementById('sb').classList.toggle('closed', sbClosed);
}

// ============================================================
//  NAVIGATION
// ============================================================
function jumpCard(id) {
  var el = document.getElementById('card-' + id);
  if (!el) return;
  el.scrollIntoView({ behavior: 'smooth', block: 'center' });
  var orig = el.style.boxShadow;
  el.style.boxShadow = '0 0 0 2px ' + (el.style.getPropertyValue('--sec-color') || '#ff7847') + '88, 0 0 40px ' + (el.style.getPropertyValue('--sec-color') || '#ff7847') + '33';
  setTimeout(function() { el.style.boxShadow = orig; }, 1500);
}

function jumpSection(id) {
  var el = document.getElementById('sec-' + id);
  if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
  setActiveSection(id);
}

function setActiveSection(id) {
  document.querySelectorAll('.tsec-hdr').forEach(function(e) { e.classList.remove('active'); });
  var hdr = document.getElementById('thdr-' + id);
  if (hdr) hdr.classList.add('active');
  document.querySelectorAll('.rbtn').forEach(function(e) { e.classList.remove('on'); });
  var rb = document.getElementById('rbtn-' + id);
  if (rb) rb.classList.add('on');
}

function setActiveCmd(id) {
  document.querySelectorAll('.tcmd').forEach(function(e) { e.classList.remove('on'); });
  var c = document.getElementById('tcmd-' + id);
  if (c) c.classList.add('on');
}

function scrollTopMain() {
  document.getElementById('main').scrollTo({ top: 0, behavior: 'smooth' });
}

// ============================================================
//  SEARCH
// ============================================================
document.getElementById('srchInput').addEventListener('input', function() {
  var q = this.value.toLowerCase().trim();
  var any = false;

  document.querySelectorAll('.section').forEach(function(sec) {
    var vis = false;
    sec.querySelectorAll('.card').forEach(function(card) {
      var match = !q || card.dataset.keys.toLowerCase().indexOf(q) >= 0;
      card.classList.toggle('hidden', !match);
      if (match) vis = true;
    });
    sec.classList.toggle('all-hidden', !vis);
    if (vis) any = true;
  });

  document.getElementById('noRes').style.display = any ? 'none' : 'block';

  if (q) {
    SECS.forEach(function(s) {
      var ch = document.getElementById('tch-' + s.id);
      var arr = document.getElementById('tarr-' + s.id);
      if (ch) { ch.style.maxHeight = '400px'; ch.classList.remove('shut'); }
      if (arr) arr.classList.add('open');
    });
  }
});

// "/" focuses the search box
document.addEventListener('keydown', function(e) {
  if (e.key === '/' && document.activeElement.tagName !== 'INPUT') {
    e.preventDefault();
    document.getElementById('srchInput').focus();
  }
  if (e.key === 'Escape') document.getElementById('srchInput').blur();
});

// ============================================================
//  SCROLL SPY + PROGRESS + BACK-TO-TOP
// ============================================================
var mainEl = document.querySelector('.main');
mainEl.addEventListener('scroll', function() {
  var top = mainEl.scrollTop;
  var mid = top + mainEl.clientHeight / 3;
  var curSec = null, curCmd = null;

  document.querySelectorAll('.section:not(.all-hidden)').forEach(function(s) {
    if (s.offsetTop <= mid) curSec = s.dataset.sid;
  });
  document.querySelectorAll('.card:not(.hidden)').forEach(function(c) {
    if (c.offsetTop <= mid + 60) curCmd = c.id.replace('card-', '');
  });

  if (curSec) setActiveSection(curSec);
  if (curCmd) setActiveCmd(curCmd);

  var max = mainEl.scrollHeight - mainEl.clientHeight;
  document.getElementById('progress').style.width = (max > 0 ? (top / max) * 100 : 0) + '%';
  document.getElementById('toTop').classList.toggle('show', top > 500);
}, { passive: true });

// ============================================================
//  SCROLL REVEAL (cards + section headers)
// ============================================================
function setupReveal() {
  if (!('IntersectionObserver' in window)) {
    document.querySelectorAll('.card,.section').forEach(function(el) { el.classList.add('seen'); });
    return;
  }
  var io = new IntersectionObserver(function(entries) {
    entries.forEach(function(en) {
      if (en.isIntersecting) {
        en.target.classList.add('seen');
        io.unobserve(en.target);
      }
    });
  }, { root: mainEl, threshold: 0.12, rootMargin: '0px 0px -40px 0px' });
  document.querySelectorAll('.card,.section').forEach(function(el) { io.observe(el); });
}

// ============================================================
//  CARD SPOTLIGHT (cursor-tracked glow)
// ============================================================
mainEl.addEventListener('mousemove', function(e) {
  var card = e.target.closest ? e.target.closest('.card') : null;
  if (!card) return;
  var r = card.getBoundingClientRect();
  card.style.setProperty('--mx', (e.clientX - r.left) + 'px');
  card.style.setProperty('--my', (e.clientY - r.top) + 'px');
}, { passive: true });

// ============================================================
//  HERO: TYPING TERMINAL + COUNT-UP STATS
// ============================================================
var PHRASES = [
  'git commit -m "ship it"',
  'git switch -c feature/awesome',
  'git rebase -i HEAD~3',
  'git push --force-with-lease',
  'git reflog  # nothing is ever lost',
  'git bisect run npm test'
];
(function typeLoop() {
  var el = document.getElementById('typed');
  var pi = 0, ci = 0, deleting = false;
  function tick() {
    var p = PHRASES[pi];
    if (!deleting) {
      ci++;
      el.textContent = p.slice(0, ci);
      if (ci === p.length) { deleting = true; return setTimeout(tick, 2100); }
      return setTimeout(tick, 42 + Math.random() * 60);
    }
    ci--;
    el.textContent = p.slice(0, ci);
    if (ci === 0) { deleting = false; pi = (pi + 1) % PHRASES.length; return setTimeout(tick, 450); }
    setTimeout(tick, 18);
  }
  setTimeout(tick, 700);
})();

function countUp(id, target, ms) {
  var el = document.getElementById(id);
  var start = null;
  function step(ts) {
    if (!start) start = ts;
    var t = Math.min((ts - start) / ms, 1);
    var eased = 1 - Math.pow(1 - t, 3);
    el.textContent = Math.round(target * eased);
    if (t < 1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

// ============================================================
//  TOOLTIP ENGINE
// ============================================================
var tipEl = document.getElementById('tip');
var tipTimer = null;

document.addEventListener('mousemove', function(e) {
  if (tipEl.classList.contains('show')) {
    var left = Math.min(e.clientX + 14, window.innerWidth - tipEl.offsetWidth - 8);
    var top = Math.max(e.clientY - 40, 6);
    tipEl.style.left = left + 'px';
    tipEl.style.top = top + 'px';
  }
});

document.addEventListener('mouseover', function(e) {
  var tgt = e.target.closest ? e.target.closest('[data-tip]') : null;
  if (!tgt) return;
  clearTimeout(tipTimer);
  var msg = tgt.getAttribute('data-tip');
  tipTimer = setTimeout(function() {
    tipEl.textContent = msg;
    tipEl.classList.add('show');
  }, 180);
});

document.addEventListener('mouseout', function(e) {
  var tgt = e.target.closest ? e.target.closest('[data-tip]') : null;
  if (!tgt) return;
  clearTimeout(tipTimer);
  tipEl.classList.remove('show');
});

// ============================================================
//  INIT
// ============================================================
buildTree();
var TOTAL_CMDS = buildMain();
setupReveal();
countUp('statCmds', TOTAL_CMDS, 1400);
countUp('statSecs', SECS.length, 1100);
countUp('statExs', TOTAL_EX, 1700);
</script>
